<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQSP Agency Forms</title>
</head>
<body>
  <form name="sqsp-website-review" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="sqsp-website-review">
    <input name="bot-field">
    <input name="service_need">
    <input name="has_website">
    <input name="main_issue">
    <input name="timeline">
    <input name="budget">
    <input name="website_url">
    <input name="name">
    <input name="email">
    <input name="enquiry_source">
    <textarea name="message"></textarea>
  </form>

  <form name="sqsp-free-review" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="sqsp-free-review">
    <input name="bot-field">
    <input name="name">
    <input name="email">
    <input name="website_url">
  </form>

</body>
</html>
